# gruuvy.toml — Alacritty color theme
# Import into your alacritty.toml with:
#   [general]
#   import = ["~/.config/alacritty/gruuvy.toml"]

[colors.primary]
background = "#262626"
foreground = "#e8dcc8"
bright_foreground = "#f5eedc"

[colors.cursor]
text   = "#262626"
cursor = "#e0b890"

[colors.vi_mode_cursor]
text   = "#262626"
cursor = "#e9cd8b"

[colors.selection]
text       = "#f5eedc"
background = "#4e4e4e"

[colors.search.matches]
foreground = "#262626"
background = "#e8d09a"

[colors.search.focused_match]
foreground = "#262626"
background = "#e0b890"

[colors.footer_bar]
background = "#303030"
foreground = "#e8dcc8"

[colors.hints.start]
foreground = "#262626"
background = "#e8d09a"

[colors.hints.end]
foreground = "#262626"
background = "#e0b890"

[colors.normal]
black   = "#303030"
red     = "#e45858"
green   = "#7abf69"
yellow  = "#e2be69"
blue    = "#6e9ecf"
magenta = "#9d81d5"
cyan    = "#5cbcbc"
white   = "#e8dcc8"

[colors.bright]
black   = "#626262"
red     = "#ea7b7b"
green   = "#93cb86"
yellow  = "#e9cd8b"
blue    = "#8cb2d9"
magenta = "#b59fdf"
cyan    = "#79c8c8"
white   = "#f5eedc"
