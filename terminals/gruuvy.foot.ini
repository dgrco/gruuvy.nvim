# gruuvy — foot color theme
# Place in ~/.config/foot/gruuvy.ini and include with:
#   [main]
#   include=~/.config/foot/gruuvy.ini
#
# Or copy the [colors] block directly into your foot.ini

[cursor]
style=block
color=262626 e9cd8b
blink=no

[colors]
background=262626
foreground=f5eedc

selection-foreground=f5eedc
selection-background=4e4e4e

# Normal colors (0-7)
regular0=303030
regular1=e86868
regular2=7abf69
regular3=e2be69
regular4=6e9ecf
regular5=aa8edb
regular6=5cbcbc
regular7=e8dcc8

# Bright colors (8-15)
bright0=626262
bright1=ea7b7b
bright2=93cb86
bright3=e9cd8b
bright4=8cb2d9
bright5=b59fdf
bright6=79c8c8
bright7=f5eedc

# URL underline color
urls=98c8c0
