# gruuvy — foot color theme
# Place in ~/.config/foot/gruuvy.ini and include with:
#   [main]
#   include=~/.config/foot/gruuvy.ini
#
# Or copy the [colors] block directly into your foot.ini

[cursor]
style=block
color=262626 e0b890
blink=no

[colors]
background=262626
foreground=e8dcc8

selection-foreground=f5eedc
selection-background=4e4e4e

# Normal colors (0-7)
regular0=303030
regular1=e88282
regular2=a8c8a0
regular3=e8d09a
regular4=9ab8d8
regular5=c4b5e3
regular6=98c8c0
regular7=e8dcc8

# Bright colors (8-15)
bright0=626262
bright1=f09898
bright2=b8d8b0
bright3=f0dca8
bright4=aacce8
bright5=d0c4ec
bright6=a8d8d0
bright7=f5eedc

# URL underline color
urls=98c8c0
