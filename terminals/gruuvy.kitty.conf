# gruuvy.conf — kitty color theme
# Place in ~/.config/kitty/ and add: include gruuvy.conf
# Or use the themes kitten: kitty +kitten themes

# ─── Core colors ─────────────────────────────────────────────────────────────
background              #262626
foreground              #e8dcc8
selection_background    #4e4e4e
selection_foreground    #f5eedc

# ─── Cursor ──────────────────────────────────────────────────────────────────
cursor                  #e0b890
cursor_text_color       #262626
cursor_shape            block
cursor_blink_interval   0

# ─── URL underline ────────────────────────────────────────────────────────────
url_color               #98c8c0

# ─── ANSI palette ─────────────────────────────────────────────────────────────
# Normal (0-7)
color0   #303030
color1   #e8a0a0
color2   #a8c8a0
color3   #e8d09a
color4   #9ab8d8
color5   #b8a8d8
color6   #98c8c0
color7   #e8dcc8

# Bright (8-15)
color8   #626262
color9   #f0b8b8
color10  #b8d8b0
color11  #f0dca8
color12  #aacce8
color13  #c8b8e8
color14  #a8d8d0
color15  #f5eedc

# ─── Tab bar ──────────────────────────────────────────────────────────────────
active_tab_background   #262626
active_tab_foreground   #f5eedc
active_tab_font_style   bold
inactive_tab_background #303030
inactive_tab_foreground #a89f8c
tab_bar_background      #303030
